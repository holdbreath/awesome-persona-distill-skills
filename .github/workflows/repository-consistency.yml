name: Repository Consistency

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check repository consistency
        run: npm run check:consistency
